<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comic-Deck</title>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#121212;color:#e0e0e0;min-height:100vh}
.container{max-width:500px;margin:0 auto;padding:16px}

.login-box{background:#1e1e1e;border-radius:12px;padding:32px;margin-top:60px;text-align:center}
.login-box h1{color:#69f0ae;font-size:28px;margin-bottom:8px}
.login-box p{color:#888;margin-bottom:24px}

input,select,textarea{width:100%;padding:12px 16px;margin-bottom:12px;border:1px solid #333;border-radius:8px;background:#2a2a2a;color:#fff;font-size:16px}
input:focus,textarea:focus{outline:none;border-color:#69f0ae}
textarea{resize:vertical;min-height:80px}

.btn{width:100%;padding:14px;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn:hover{opacity:.9}
.btn-primary{background:#69f0ae;color:#000}
.btn-secondary{background:#333;color:#fff;margin-top:8px}
.btn-small{padding:8px 12px;font-size:13px;width:auto}
.btn-danger{background:#cf6679;color:#fff}

.error{color:#cf6679;margin-top:8px;font-size:14px}
.success{color:#69f0ae;margin-top:8px;font-size:14px}

.header{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-bottom:1px solid #333;margin-bottom:16px}
.header h1{color:#69f0ae;font-size:22px}
.header .user{color:#888;font-size:13px}

.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab{flex:1;padding:12px;text-align:center;background:#1e1e1e;border:1px solid #333;border-radius:8px;cursor:pointer;color:#888}
.tab.active{background:#69f0ae;color:#000;font-weight:600}

.comic-list{display:flex;flex-direction:column;gap:12px}
.comic-card{background:#1e1e1e;border-radius:12px;padding:16px;display:flex;gap:16px;align-items:flex-start;position:relative}
.comic-thumb{width:80px;height:120px;object-fit:cover;border-radius:8px;cursor:pointer;flex-shrink:0;background:#2a2a2a;display:flex;align-items:center;justify-content:center;font-size:32px;color:#555}
.comic-info{flex:1;min-width:0}
.comic-info h3{font-size:16px;color:#fff;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.comic-info p{font-size:13px;color:#888;margin-bottom:2px}
.comic-tags{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}

.tag{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase}
.tag-signed{background:#ffc107;color:#000}
.tag-coa{background:#1565c0;color:#fff}
.tag-remark{background:#7b1fa2;color:#fff}
.tag-graded{background:#69f0ae;color:#000}

.delete-btn{position:absolute;top:8px;right:8px;background:none;border:none;color:#cf6679;font-size:20px;cursor:pointer;padding:4px}
.edit-btn{right:40px;color:#69f0ae}

.form-section{background:#1e1e1e;border-radius:12px;padding:20px}
.form-section h2{color:#69f0ae;margin-bottom:16px;font-size:18px}
.form-row{display:flex;gap:12px}
.form-row>*{flex:1}

.checkboxes{display:flex;gap:16px;flex-wrap:wrap;margin:12px 0}
.checkbox-label{display:flex;align-items:center;gap:6px;font-size:14px;color:#ccc}

.image-preview{width:100px;height:150px;object-fit:cover;border-radius:8px;margin:12px 0;display:none;background:#2a2a2a}

.file-btns{display:flex;justify-content:center;gap:16px;margin-bottom:12px}
.file-btn{cursor:pointer;width:56px;height:56px;border-radius:50%;background:#333;display:flex;align-items:center;justify-content:center;font-size:24px;color:#69f0ae;border:2px solid #69f0ae;position:relative}
.file-btn input{position:absolute;opacity:0;width:0;height:0}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal-content{background:#1e1e1e;border-radius:12px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto;padding:20px}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-header h3{color:#69f0ae}
.modal-close{background:none;border:none;color:#fff;font-size:24px;cursor:pointer}
.modal-img{width:100%;max-height:400px;object-fit:contain;border-radius:8px;margin-bottom:16px}
.modal-meta p{color:#888;margin-bottom:4px}

.hidden{display:none!important}
.empty-state{text-align:center;padding:40px;color:#666;font-style:italic}

.stat-card{background:#2a2a2a;border-radius:10px;padding:16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.stat-card .stat-label{color:#888;font-size:14px}
.stat-card .stat-value{color:#69f0ae;font-size:22px;font-weight:700}
.stat-card .stat-value.big{font-size:32px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.stat-grid .stat-card{flex-direction:column;text-align:center}
.stat-grid .stat-card .stat-label{margin-bottom:4px}

.filters{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filters select{flex:1;min-width:100px;margin-bottom:0}
</style>
<base target="_blank">
</head>
<body>

<div class="container">
  <div id="loginScreen">
    <div class="login-box">
      <h1>Comic-Deck</h1>
      <p>Il tuo archivio fumetti personale</p>
      <input type="email" id="emailInput" placeholder="Email">
      <input type="password" id="passwordInput" placeholder="Password">
      <button class="btn btn-primary" onclick="handleLogin()">Accedi</button>
      <button class="btn btn-secondary" onclick="handleSignup()">Registrati</button>
      <div id="loginMsg"></div>
    </div>
  </div>

  <div id="mainScreen" class="hidden">
    <div class="header">
      <div><h1>Comic-Deck</h1><span class="user" id="userEmail"></span></div>
      <button class="btn btn-small btn-secondary" onclick="handleLogout()">Esci</button>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('list')" id="tabList">Collezione</div>
      <div class="tab" onclick="switchTab('add')" id="tabAdd">Aggiungi</div>
      <div class="tab" onclick="switchTab('stats')" id="tabStats">Statistiche</div>
    </div>

    <div id="listView">
      <div id="pullIndicator" class="hidden" style="text-align:center;padding:20px;color:#69f0ae">&#8595; Rilascia per aggiornare</div>
      <input type="text" class="search-bar" id="searchInput" placeholder="Cerca..." oninput="searchComics()">
      <div class="filters">
        <select id="filterTipo" onchange="searchComics()"><option value="">Tutti i tipi</option><option>Comics</option><option>Manga</option><option>Libri</option></select>
        <select id="filterLingua" onchange="searchComics()"><option value="">Tutte le lingue</option><option>Italiano</option><option>English</option><option>Altro</option></select>
        <select id="filterAnno" onchange="searchComics()"><option value="">Tutti gli anni</option></select>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <button class="btn btn-secondary btn-small" style="flex:1;margin-top:0" onclick="exportCSV()">&#128190; CSV</button>
        <button class="btn btn-secondary btn-small" style="flex:1;margin-top:0" onclick="exportPDF()">&#128196; PDF</button>
      </div>
      <div id="comicList" class="comic-list"></div>
    </div>

    <div id="addView" class="hidden">
      <div class="form-section" oninput="markDirty()" onchange="markDirty()">
        <h2 id="formTitle">Aggiungi un nuovo albo</h2>
        <div class="file-btns">
          <label class="file-btn" title="Scatta Foto">&#128247;<input type="file" id="coverInputCamera" accept="image/*" capture="environment" onchange="previewImage(this)"></label>
          <label class="file-btn" title="Galleria">&#128444;<input type="file" id="coverInputGallery" accept="image/*" onchange="previewImage(this)"></label>
        </div>
        <img id="imagePreview" class="image-preview">
        <input type="text" id="titolo" placeholder="Titolo *">
        <select id="categoria"><option>Comics</option><option>Manga</option><option>Libri</option></select>
        <div class="form-row">
          <input type="number" id="numero" placeholder="Numero" min="0">
          <input type="number" id="anno" placeholder="Anno" min="1900" max="2100">
        </div>
        <input type="text" id="publisher" placeholder="Publisher">
        <input type="text" id="disegnatore" placeholder="Disegnatore">
        <select id="lingua"><option>Italiano</option><option>English</option><option>Altro</option></select>
        <select id="variant"><option>Standard</option><option>Variant</option><option>Virgin</option></select>
        <select id="stato">
          <option value="Non Specificato">Stato del Fumetto</option>
          <option>Mint (Perfetto)</option>
          <option>Near Mint (Quasi Perfetto)</option>
          <option>Very Fine / Very Good</option>
          <option>Rovinato / Battle Damaged</option>
        </select>
        <div class="checkboxes">
          <label class="checkbox-label"><input type="checkbox" id="firmato"> Firmato</label>
          <label class="checkbox-label"><input type="checkbox" id="coa"> COA</label>
          <label class="checkbox-label"><input type="checkbox" id="remark"> Remark</label>
          <label class="checkbox-label"><input type="checkbox" id="gradato" onchange="toggleGradazione()"> Gradato</label>
        </div>
        <textarea id="note" placeholder="Note..." rows="3"></textarea>
        <div id="gradazioneFields" class="hidden">
          <div class="form-row">
            <input type="number" id="votoGradazione" placeholder="Voto (es. 9.8)" step="0.1" min="0" max="10">
            <select id="enteGradazione">
              <option value="">Ente di gradazione</option>
              <option>CGC</option><option>GRAAD</option><option>EGS</option><option>Cread</option><option>CBCS</option><option>PGx</option>
            </select>
          </div>
        </div>
        <button class="btn btn-primary" id="saveBtn" onclick="saveComic()">Salva in Archivio</button>
        <div id="saveMsg"></div>
      </div>
    </div>

    <div id="statsView" class="hidden">
      <div class="form-section">
        <h2>Statistiche Collezione</h2>
        <div id="statsContent"></div>
      </div>
    </div>
  </div>
</div>

<div id="modalOverlay" class="modal-overlay hidden" onclick="closeModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-header"><h3>Anteprima Copertina</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
    <img id="modalImg" class="modal-img" src="" alt="Copertina">
    <div id="modalMeta" class="modal-meta"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://altubrcwczbxqpwdjiav.supabase.co';
const SUPABASE_KEY = 'sb_publishable_qWfV1_-RfhOk8efDgqiYkQ_MLiAgYvy';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null, allComics = [], editingId = null, formDirty = false;

const qs = (s) => document.querySelector(s);
const qsa = (s) => document.querySelectorAll(s);

// ==================== AUTH ====================
async function handleLogin() {
  const email = qs('#emailInput').value.trim(), password = qs('#passwordInput').value, msg = qs('#loginMsg');
  if (!email || !password) return msg.innerHTML = '<span class="error">Inserisci email e password</span>';
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) return msg.innerHTML = `<span class="error">${error.message}</span>`;
  currentUser = data.user;
  showMainScreen();
}

async function handleSignup() {
  const email = qs('#emailInput').value.trim(), password = qs('#passwordInput').value, msg = qs('#loginMsg');
  if (!email || !password) return msg.innerHTML = '<span class="error">Inserisci email e password</span>';
  if (password.length < 6) return msg.innerHTML = '<span class="error">Password minimo 6 caratteri</span>';
  const { error } = await sb.auth.signUp({ email, password });
  msg.innerHTML = error ? `<span class="error">${error.message}</span>` : '<span class="success">Registrato! Ora accedi.</span>';
}

async function handleLogout() {
  await sb.auth.signOut();
  currentUser = null;
  qs('#loginScreen').classList.remove('hidden');
  qs('#mainScreen').classList.add('hidden');
}

async function checkSession() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) { currentUser = session.user; showMainScreen(); }
}

function showMainScreen() {
  qs('#loginScreen').classList.add('hidden');
  qs('#mainScreen').classList.remove('hidden');
  qs('#userEmail').textContent = currentUser.email;
  loadComics();
}

// ==================== COMICS ====================
async function loadComics() {
  const { data, error } = await sb.from('fumetti')
    .select('id,titolo,numero,anno,publisher,disegnatore,lingua,variant,stato,firmato,coa,remark,gradato,voto_gradazione,ente_gradazione,immagine_url,categoria,note,user_id,created_at')
    .eq('user_id', currentUser.id).order('created_at', { ascending: false });
  if (error) return qs('#comicList').innerHTML = `<div class="empty-state">Errore: ${error.message}</div>`;
  allComics = data || [];
  populateAnnoFilter();
  renderComics(allComics);
}

function renderComics(comics) {
  const list = qs('#comicList');
  if (!comics.length) return list.innerHTML = '<div class="empty-state">Nessun fumetto in archivio. Inizia ad aggiungerne uno!</div>';
  list.innerHTML = '';
  comics.forEach(c => list.appendChild(buildCard(c)));
}

function buildCard(c) {
  const card = document.createElement('div'); card.className = 'comic-card';
  
  const tags = [];
  if (c.firmato) tags.push('signed');
  if (c.coa) tags.push('coa');
  if (c.remark) tags.push('remark');
  if (c.gradato) tags.push('graded');

  const editBtn = document.createElement('button');
  editBtn.className = 'delete-btn edit-btn'; editBtn.innerHTML = '&#9998;';
  editBtn.onclick = () => editComic(c);
  card.appendChild(editBtn);

  const delBtn = document.createElement('button');
  delBtn.className = 'delete-btn'; delBtn.innerHTML = '&#128465;';
  delBtn.onclick = () => deleteComic(c.id, c.titolo);
  card.appendChild(delBtn);

  if (c.immagine_url) {
    const img = document.createElement('img');
    img.src = c.immagine_url; img.className = 'comic-thumb';
    img.onclick = () => openModal(c);
    card.appendChild(img);
  } else {
    const ph = document.createElement('div'); ph.className = 'comic-thumb'; ph.innerHTML = '&#128214;';
    card.appendChild(ph);
  }

  const info = document.createElement('div'); info.className = 'comic-info';
  const num = c.numero ? `<span style="color:#69f0ae;font-weight:700">#${esc(c.numero)}</span> ` : '';
  const notePreview = (c.note || '').length > 50 ? esc(c.note.substring(0, 50)) + '...' : esc(c.note || '');
  
  info.innerHTML = `
    <h3>${num}${esc(c.titolo || 'Titolo sconosciuto')}</h3>
    <p><strong style="color:#69f0ae">${esc(c.categoria || 'Comics')}</strong></p>
    <p>Issue: ${esc(c.numero || '-')} Year: ${esc(c.anno || '-')}</p>
    <p>Publisher: ${esc(c.publisher || '-')}</p>
    <p>Disegnatore: ${esc(c.disegnatore || '-')}</p>
    <p>Tipo: ${esc(c.variant)} ${esc(c.lingua)}</p>
    <p>Stato: ${esc(c.stato)}</p>
    ${c.gradato && c.voto_gradazione ? `<p>Gradato: ${esc(c.voto_gradazione)} (${esc(c.ente_gradazione)})</p>` : ''}
    ${c.note ? `<p style="color:#69f0ae;font-style:italic">&#9998; ${notePreview}</p>` : ''}
    <div class="comic-tags">${tags.map(t => `<span class="tag tag-${t}">${t==='signed'?'Firmato':t==='coa'?'COA':t==='remark'?'Sketch':'Gradato'}</span>`).join('')}</div>
  `;
  card.appendChild(info);
  return card;
}

function searchComics() {
  const q = qs('#searchInput').value.toLowerCase().trim();
  const tipo = qs('#filterTipo').value, lingua = qs('#filterLingua').value, anno = qs('#filterAnno').value;
  
  let f = allComics.filter(c => !q || [c.titolo,c.publisher,c.numero,c.anno,c.disegnatore,c.note].some(v => (v||'').toLowerCase().includes(q)));
  if (tipo) f = f.filter(c => (c.categoria || 'Comics') === tipo);
  if (lingua) f = f.filter(c => (c.lingua || 'Italiano') === lingua);
  if (anno) f = f.filter(c => c.anno === anno);
  
  f.sort((a,b) => (parseInt(a.numero)||0) - (parseInt(b.numero)||0) || (a.titolo||'').localeCompare(b.titolo||''));
  renderComics(f);
}

function populateAnnoFilter() {
  const sel = qs('#filterAnno');
  while (sel.options.length > 1) sel.remove(1);
  [...new Set(allComics.map(c => c.anno).filter(Boolean))].sort((a,b) => b-a).forEach(a => {
    sel.add(new Option(a, a));
  });
}

async function deleteComic(id, titolo) {
  if (!confirm(`Eliminare "${titolo}"? L'immagine verrà cancellata.`)) return;
  const comic = allComics.find(c => c.id === id);
  const { error } = await sb.from('fumetti').delete().eq('id', id).eq('user_id', currentUser.id);
  if (error) return alert('Errore: ' + error.message);
  if (comic?.immagine_url) await sb.storage.from('copertine').remove([comic.immagine_url.split('/').pop()]);
  loadComics();
}

// ==================== FORM ====================
function previewImage(input) {
  const preview = qs('#imagePreview');
  if (!input.files?.[0]) return;
  const reader = new FileReader();
  reader.onload = e => { preview.src = e.target.result; preview.style.display = 'block'; };
  reader.readAsDataURL(input.files[0]);
}

function getComicData() {
  const gradato = qs('#gradato').checked;
  return {
    titolo: qs('#titolo').value.trim(),
    numero: qs('#numero').value.trim(),
    anno: qs('#anno').value.trim(),
    publisher: qs('#publisher').value.trim(),
    disegnatore: qs('#disegnatore').value.trim(),
    categoria: qs('#categoria').value,
    lingua: qs('#lingua').value,
    variant: qs('#variant').value,
    stato: qs('#stato').value || 'Non Specificato',
    firmato: qs('#firmato').checked,
    coa: qs('#coa').checked,
    remark: qs('#remark').checked,
    gradato,
    voto_gradazione: gradato ? (qs('#votoGradazione').value.trim() || '') : '',
    ente_gradazione: gradato ? (qs('#enteGradazione').value || '') : '',
    note: qs('#note').value.trim()
  };
}

async function saveComic() {
  const isEditing = editingId !== null;
  const data = getComicData();
  const msg = qs('#saveMsg');
  if (!data.titolo) return msg.innerHTML = '<span class="error">Inserisci almeno il titolo!</span>';

  const fileInput = (qs('#coverInputCamera').files?.[0]) ? qs('#coverInputCamera') : qs('#coverInputGallery');
  let imageUrl = '';

  if (fileInput.files?.[0]) {
    const file = fileInput.files[0];
    const fileName = `${Date.now()}_${Math.random().toString(36).slice(2,11)}.${file.name.split('.').pop()}`;
    const { error: upErr } = await sb.storage.from('copertine').upload(fileName, file, { contentType: file.type });
    if (upErr) return msg.innerHTML = `<span class="error">Errore upload: ${upErr.message}</span>`;
    imageUrl = sb.storage.from('copertine').getPublicUrl(fileName).data.publicUrl;
    fileInput.value = '';
  }

  let result;
  if (isEditing) {
    const upd = { ...data };
    if (imageUrl) upd.immagine_url = imageUrl;
    result = await sb.from('fumetti').update(upd).eq('id', editingId).eq('user_id', currentUser.id);
  } else {
    result = await sb.from('fumetti').insert({ ...data, user_id: currentUser.id, immagine_url: imageUrl });
  }

  if (result.error) return msg.innerHTML = `<span class="error">Errore: ${result.error.message}</span>`;
  
  resetForm();
  msg.innerHTML = `<span class="success">${isEditing ? 'Aggiornato' : 'Salvato'} con successo!</span>`;
  resetFormDirty();
  setTimeout(() => { msg.innerHTML = ''; switchTab('list'); loadComics(); }, 800);
}

function resetForm() {
  ['titolo','numero','anno','publisher','disegnatore','note','votoGradazione'].forEach(id => qs('#'+id).value = '');
  qs('#categoria').value = 'Comics'; qs('#lingua').value = 'Italiano'; qs('#variant').value = 'Standard'; qs('#stato').value = 'Non Specificato';
  ['firmato','coa','remark','gradato'].forEach(id => qs('#'+id).checked = false);
  qs('#enteGradazione').value = ''; qs('#gradazioneFields').classList.add('hidden');
  qs('#coverInputCamera').value = ''; qs('#coverInputGallery').value = '';
  qs('#imagePreview').style.display = 'none';
  editingId = null;
  qs('#saveBtn').textContent = 'Salva in Archivio';
  qs('#formTitle').textContent = 'Aggiungi un nuovo albo';
}

function toggleGradazione() {
  qs('#gradazioneFields').classList.toggle('hidden', !qs('#gradato').checked);
}

// ==================== MODAL ====================
function openModal(c) {
  qs('#modalImg').src = c.immagine_url;
  const tags = [
    c.firmato && '<span style="background:#ffc107;color:#000;padding:4px 8px;border-radius:4px;font-size:12px;font-weight:700">FIRMATO</span>',
    c.coa && '<span style="background:#1565c0;color:#fff;padding:4px 8px;border-radius:4px;font-size:12px;font-weight:700">COA</span>',
    c.remark && '<span style="background:#7b1fa2;color:#fff;padding:4px 8px;border-radius:4px;font-size:12px;font-weight:700">SKETCH</span>',
    c.gradato && '<span style="background:#69f0ae;color:#000;padding:4px 8px;border-radius:4px;font-size:12px;font-weight:700">GRADATO</span>'
  ].filter(Boolean);
  
  qs('#modalMeta').innerHTML = `
    <p><strong style="color:#fff;font-size:18px">${esc(c.titolo)}</strong></p>
    <p><strong style="color:#69f0ae">${esc(c.categoria || 'Comics')}</strong></p>
    <p>Issue: ${esc(c.numero || '-')}</p><p>Anno: ${esc(c.anno || '-')}</p>
    <p>Publisher: ${esc(c.publisher || '-')}</p><p>Disegnatore: ${esc(c.disegnatore || '-')}</p>
    <p>Tipo: ${esc(c.variant || '-')}</p><p>Lingua: ${esc(c.lingua || '-')}</p><p>Stato: ${esc(c.stato || '-')}</p>
    ${c.gradato && c.voto_gradazione ? `<p>Gradato: ${esc(c.voto_gradazione)} (${esc(c.ente_gradazione)})</p>` : ''}
    ${c.note ? `<p style="color:#69f0ae;margin-top:8px;font-style:italic">&#9998; ${esc(c.note)}</p>` : ''}
    <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">${tags.join('')}</div>
  `;
  qs('#modalOverlay').classList.remove('hidden');
}

function closeModal(e) {
  if (!e || e.target.id === 'modalOverlay') qs('#modalOverlay').classList.add('hidden');
}

// ==================== EDIT ====================
function editComic(c) {
  editingId = c.id;
  Object.entries({titolo:c.titolo,numero:c.numero,anno:c.anno,publisher:c.publisher,disegnatore:c.disegnatore,note:c.note}).forEach(([k,v]) => qs('#'+k).value = v || '');
  qs('#categoria').value = c.categoria || 'Comics'; qs('#lingua').value = c.lingua || 'Italiano';
  qs('#variant').value = c.variant || 'Standard'; qs('#stato').value = c.stato || 'Non Specificato';
  ['firmato','coa','remark','gradato'].forEach(k => qs('#'+k).checked = c[k] || false);
  toggleGradazione();
  if (c.gradato) { qs('#votoGradazione').value = c.voto_gradazione || ''; qs('#enteGradazione').value = c.ente_gradazione || ''; }
  if (c.immagine_url) { const p = qs('#imagePreview'); p.src = c.immagine_url; p.style.display = 'block'; }
  qs('#saveBtn').textContent = 'Aggiorna Fumetto'; qs('#formTitle').textContent = 'Modifica albo';
  switchTab('add');
}

function markDirty() { formDirty = true; }
function isFormDirty() {
  const fields = ['titolo','numero','anno','publisher','disegnatore','note'];
  return formDirty || fields.some(f => qs('#'+f).value.trim());
}
function resetFormDirty() { formDirty = false; }

// ==================== EXPORT ====================
function exportCSV() {
  if (!allComics.length) return alert('Nessun fumetto da esportare!');
  const headers = ['Titolo','Categoria','Numero','Anno','Publisher','Disegnatore','Lingua','Variant','Stato','Firmato','COA','Remark','Gradato','Voto','Ente','Note','Immagine'];
  const rows = allComics.map(c => [
    c.titolo||'', c.categoria||'Comics', c.numero||'', c.anno||'', c.publisher||'', c.disegnatore||'',
    c.lingua||'', c.variant||'', c.stato||'', c.firmato?'Sì':'No', c.coa?'Sì':'No', c.remark?'Sì':'No',
    c.gradato?'Sì':'No', c.voto_gradazione||'', c.ente_gradazione||'', (c.note||'').replace(/\n/g,' '), c.immagine_url||''
  ].join(';'));
  downloadBlob(new Blob([headers.join(';')+'\n'+rows.join('\n')], {type:'text/csv'}), `comic_deck_${new Date().toISOString().split('T')[0]}.csv`);
}

function exportPDF() {
  if (!allComics.length) return alert('Nessun fumetto da esportare!');
  const w = window.open('', '_blank');
  if (!w) return alert('Permetti i popup');
  const rows = allComics.map(c => {
    const tags = [c.firmato&&'Firmato',c.coa&&'COA',c.remark&&'Sketch',c.gradato&&`Gradato ${c.voto_gradazione||''}`].filter(Boolean);
    return `<tr><td><strong>${esc(c.titolo)}</strong></td><td>${esc(c.categoria||'Comics')}</td><td>${esc(c.numero)}</td><td>${esc(c.anno)}</td><td>${esc(c.publisher)}</td><td>${esc(c.disegnatore)}</td><td>${esc(c.stato)}</td><td>${esc((c.note||'').substring(0,100))}</td><td>${tags.join(' ')}</td></tr>`;
  }).join('');
  w.document.write(`<html><head><meta charset="utf-8"><style>body{font-family:Arial;padding:20px}table{width:100%;border-collapse:collapse}th,td{border:1px solid #ddd;padding:8px;font-size:12px}th{background:#69f0ae}</style></head><body><h1>Comic-Deck</h1><p>${new Date().toLocaleDateString('it-IT')}</p><table><thead><tr><th>Titolo</th><th>Cat</th><th>N</th><th>Anno</th><th>Publisher</th><th>Disegnatore</th><th>Stato</th><th>Note</th><th>Tag</th></tr></thead><tbody>${rows}</tbody></table></body></html>`);
  w.document.close(); setTimeout(() => w.print(), 500);
}

function downloadBlob(blob, filename) {
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename; a.click();
}

// ==================== STATS ====================
function showStats() {
  const cont = qs('#statsContent');
  if (!allComics.length) return cont.innerHTML = '<div class="empty-state">Nessun dato disponibile.</div>';
  const count = (fn) => allComics.filter(fn).length;
  const stats = [
    {label:'Totale Elementi',value:allComics.length,big:true},
    {label:'Comics',value:count(c=>(c.categoria||'Comics')==='Comics')},
    {label:'Manga',value:count(c=>c.categoria==='Manga')},
    {label:'Libri',value:count(c=>c.categoria==='Libri')},
    {label:'Italiano',value:count(c=>(c.lingua||'Italiano')==='Italiano')},
    {label:'English',value:count(c=>c.lingua==='English')},
    {label:'Gradati',value:count(c=>c.gradato)},
    {label:'Firmati',value:count(c=>c.firmato)},
    {label:'COA',value:count(c=>c.coa)},
    {label:'Sketch',value:count(c=>c.remark)}
  ];
  cont.innerHTML = `
    <div class="stat-card"><span class="stat-label">${stats[0].label}</span><span class="stat-value big">${stats[0].value}</span></div>
    <div class="stat-grid">${stats.slice(1).map(s=>`<div class="stat-card"><span class="stat-label">${s.label}</span><span class="stat-value">${s.value}</span></div>`).join('')}</div>
  `;
}

// ==================== TABS & UTILS ====================
function switchTab(tab) {
  if (!qs('#addView').classList.contains('hidden') && tab !== 'add' && isFormDirty() && !confirm('Hai dati non salvati. Uscire?')) return;
  resetFormDirty();
  ['list','add','stats'].forEach(t => {
    qs('#tab'+t[0].toUpperCase()+t.slice(1)).classList.toggle('active', tab===t);
    qs('#'+t+'View').classList.toggle('hidden', tab!==t);
  });
  if (tab === 'list') loadComics();
  if (tab === 'stats') showStats();
}

function esc(t) {
  if (!t) return '';
  const d = document.createElement('div'); d.textContent = t; return d.innerHTML;
}

// ==================== PULL TO REFRESH ====================
let pullStartY = 0, pullCurrentY = 0, isPulling = false;
const listView = qs('#listView'), pullInd = qs('#pullIndicator');

listView?.addEventListener('touchstart', e => {
  if (listView.scrollTop === 0) { pullStartY = e.touches[0].clientY; isPulling = true; }
}, {passive:true});

listView?.addEventListener('touchmove', e => {
  if (!isPulling) return;
  pullCurrentY = e.touches[0].clientY;
  if (pullCurrentY - pullStartY > 60 && listView.scrollTop <= 0) pullInd.classList.remove('hidden');
}, {passive:true});

listView?.addEventListener('touchend', () => {
  if (!isPulling) return;
  if (pullCurrentY - pullStartY > 80 && listView.scrollTop <= 0) {
    pullInd.textContent = 'Aggiornamento...';
    loadComics().then(() => { pullInd.classList.add('hidden'); pullInd.textContent = '↓ Rilascia per aggiornare'; });
  } else pullInd.classList.add('hidden');
  isPulling = false; pullStartY = 0; pullCurrentY = 0;
});

// ==================== INIT ====================
checkSession();
</script>
</body>
